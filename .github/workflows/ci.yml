name: KauFeedback CI-CD

on:
  push:
    branches:
      - main

jobs:
  backend-build:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Grant Execute Permission
        run: chmod +x gradlew

      - name: Build Backend
        run: ./gradlew clean build -x test

  frontend-build:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        run: npm install

      - name: Build Frontend
        run: npm run build

  deploy:
    needs:
      - backend-build
      - frontend-build

    runs-on: ubuntu-latest

    steps:
      - name: Deploy To EC2
        uses: appleboy/ssh-action@v1.0.3

        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}

          script: |
            git config --global --add safe.directory /home/ubuntu/kaufeedback

            cd /home/ubuntu/kaufeedback

            echo "===== FETCHING LATEST CODE ====="
            git fetch origin

            git reset --hard origin/main

            echo "===== CURRENT COMMIT ====="
            git log --oneline -1

            echo "===== STOPPING CONTAINERS ====="
            docker compose down || true

            echo "===== REMOVING OLD IMAGES ====="
            docker rmi kaufeedback-frontend || true
            docker rmi kaufeedback-backend || true

            echo "===== DOCKER CLEANUP ====="
            docker system prune -af

            echo "===== REBUILDING ====="
            docker compose build --no-cache

            echo "===== STARTING ====="
            docker compose up -d

            echo "===== RUNNING CONTAINERS ====="
            docker ps
