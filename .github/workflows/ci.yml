name: CI

on:
push:
branches:
- main

pull_request:
branches:
- main

jobs:

backend-build:

```
runs-on: ubuntu-latest

defaults:
  run:
    working-directory: backend

steps:

  - uses: actions/checkout@v4

  - uses: actions/setup-java@v4
    with:
      distribution: temurin
      java-version: 21

  - name: Build Backend
    run: ./gradlew build
```

frontend-build:

```
runs-on: ubuntu-latest

defaults:
  run:
    working-directory: frontend

steps:

  - uses: actions/checkout@v4

  - uses: actions/setup-node@v4
    with:
      node-version: 20

  - run: npm install

  - run: npm run build
```
